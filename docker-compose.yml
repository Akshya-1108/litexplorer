# ═══════════════════════════════════════════════════════════════
#  LitExplorer AI — Docker Compose (Full Stack with Ollama)
# ═══════════════════════════════════════════════════════════════

services:

  # ── Ollama Service ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    restart: unless-stopped
    # If you have an NVIDIA GPU, uncomment the lines below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: litexplorer-backend
    environment:
      # CRITICAL: We changed this to 'http://ollama:11434' to talk to the container
      - OLLAMA_BASE_URL=http://ollama:11434
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - LLM_MODEL=${LLM_MODEL:-llama3}
      - CHUNK_SIZE=${CHUNK_SIZE:-800}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-100}
      - RETRIEVAL_K=${RETRIEVAL_K:-4}
      - MAX_SUMMARY_CHUNKS=${MAX_SUMMARY_CHUNKS:-6}
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Nginx + React Frontend ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: litexplorer-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────
volumes:
  ollama_storage: